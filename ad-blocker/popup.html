<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .shield { font-size: 24px; }
    .header h1 { font-size: 16px; font-weight: 600; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #555;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #2ecc71; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    /* Stats card */
    .stats {
      background: #16213e;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    .blocked-count {
      font-size: 36px;
      font-weight: 700;
      color: #e74c3c;
    }
    .blocked-count.zero { color: #2ecc71; }
    .blocked-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Current site card */
    .site-card {
      background: #16213e;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-info { flex: 1; min-width: 0; }
    .site-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .site-domain {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-status {
      font-size: 11px;
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 4px;
      display: inline-block;
    }
    .site-status.protected {
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }
    .site-status.whitelisted {
      background: rgba(241, 196, 15, 0.15);
      color: #f1c40f;
    }

    /* Whitelist button */
    .whitelist-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 16px;
    }
    .whitelist-btn:active { transform: scale(0.98); }
    .whitelist-btn.add {
      background: #f39c12;
      color: #1a1a2e;
    }
    .whitelist-btn.add:hover { background: #e67e22; }
    .whitelist-btn.remove {
      background: #e74c3c;
      color: white;
    }
    .whitelist-btn.remove:hover { background: #c0392b; }

    /* Whitelist section */
    .whitelist-section {
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
    }
    .whitelist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }
    .whitelist-header:hover { background: rgba(255,255,255,0.03); }
    .whitelist-title {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
    }
    .whitelist-count {
      font-size: 11px;
      color: #888;
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .chevron {
      font-size: 10px;
      color: #888;
      transition: transform 0.2s;
      margin-left: 8px;
    }
    .chevron.open { transform: rotate(90deg); }

    .whitelist-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .whitelist-list.open {
      max-height: 300px;
      overflow-y: auto;
    }
    .whitelist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .whitelist-item-domain {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .whitelist-item-remove {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0.6;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .whitelist-item-remove:hover { opacity: 1; }
    .whitelist-empty {
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: #666;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .no-site {
      color: #666;
      font-style: italic;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <!-- Header with global toggle -->
  <div class="header">
    <div class="header-left">
      <span class="shield">🛡️</span>
      <h1>Ad Blocker</h1>
    </div>
    <label class="toggle">
      <input type="checkbox" id="globalToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <!-- Blocked count -->
  <div class="stats">
    <div class="blocked-count zero" id="count">0</div>
    <div class="blocked-label">Ads blocked on this page</div>
  </div>

  <!-- Current site section (hidden for non-http pages) -->
  <div id="siteSection" style="display: none;">
    <!-- Site info card -->
    <div class="site-card">
      <div class="site-row">
        <div class="site-info">
          <div class="site-label">Current site</div>
          <div class="site-domain" id="siteDomain"></div>
        </div>
      </div>
      <div class="site-status protected" id="siteStatus">✓ Protected</div>
    </div>

    <!-- Whitelist toggle button -->
    <button class="whitelist-btn add" id="whitelistBtn">
      Allow ads on this site
    </button>
  </div>

  <!-- No site message for non-http pages -->
  <div id="noSite" class="no-site" style="display: none;">
    Open a website to manage its ad blocking.
  </div>

  <!-- Whitelisted sites list -->
  <div class="whitelist-section" id="whitelistSection" style="display: none;">
    <div class="whitelist-header" id="whitelistHeader">
      <div style="display: flex; align-items: center; gap: 8px;">
        <span class="whitelist-title">Whitelisted sites</span>
        <span class="whitelist-count" id="whitelistCount">0</span>
      </div>
      <span class="chevron" id="chevron">▶</span>
    </div>
    <div class="whitelist-list" id="whitelistList"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
